name: Smoke

on:
  push:
  pull_request:

jobs:
  static-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify static app
        run: |
          python - <<'PY'
          from pathlib import Path
          html = Path("index.html").read_text(encoding="utf-8")
          readme = Path("README.md").read_text(encoding="utf-8")
          assert "WPM Trainer" in html
          assert "localStorage" in html
          assert "ghravenlabs.github.io/WPM-Trainer" in readme
          assert Path("assets/screenshot.png").is_file()
          PY
